name: Publish Sparkle Release

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-sparkle-release.yml'
      - '发布/V3.9.2/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or update v3.9.2 release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag='v3.9.2'
          asset_dir='发布/V3.9.2'
          if ! gh release view "$tag" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "$REPO" \
              --verify-tag \
              --title '右键增强 3.9.2' \
              --notes-file "$asset_dir/release-notes.md"
          fi
          gh release upload "$tag" \
            "$asset_dir/SuperRight-3.9.2.dmg" \
            "$asset_dir/appcast.xml" \
            --repo "$REPO" \
            --clobber
